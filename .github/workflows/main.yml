name: Build Watch Face APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Extract project
        run: |
          test -f Watchface2.zip
          rm -rf extracted
          mkdir extracted
          unzip -q Watchface2.zip -d extracted

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle -p extracted/GPT_Test_Watchface :watchface:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GPT-Test-Watchface-APK
          path: extracted/GPT_Test_Watchface/watchface/build/outputs/apk/debug/watchface-debug.apk
          if-no-files-found: error
